<div class="cyber-chat-widget">
  <section class="chat-panel">
    <div class="chat-titlebar">
      ---- ChatRoom Sync v1.0 ----
    </div>

    <div class="chat-body">
      <!-- item will be appended to this layout -->
      <div id="log" class="sl__chat__layout"></div>

      <div class="terminal-cursor">&gt;_</div>
    </div>

    <div class="chat-statusbar">
      <span>STATUS: ONLINE</span>
      <span>PAGE: 00000</span>
    </div>
  </section>
</div>

<!-- chat item -->
<script type="text/template" id="chatlist_item">
  <div class="chat-line-native" data-from="{from}" data-id="{messageId}">
    <span class="timestamp"></span>
    <span class="meta" style="color: {color}">
      <span class="badges"></span>
      <span class="name">{from}</span>
    </span>
    <span class="message">{message}</span>
  </div>
</script>
